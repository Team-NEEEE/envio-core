name: Build Dev Image (CI)

on:
  push:
    # 테스트용 브랜치
    branches: [ "infra-practice" ]
    # branches: ["main"]

jobs:
  build-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build dev image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/core:dev .

      - name: Push dev image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/core:dev