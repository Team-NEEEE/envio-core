name: Promote And Deploy Prod (CD)

on:
  workflow_run:
    workflows: [ "Build Dev Image (CI)" ]
    types: [ completed ]
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Docker Hub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull dev image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/core-app:dev

      - name: Tag dev as prod
        run: docker tag ${{ secrets.DOCKERHUB_USERNAME }}/core-app:dev ${{ secrets.DOCKERHUB_USERNAME }}/core-app:prod

      - name: Push prod image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/core-app:prod

      - name: Deploy to VM over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            DEPLOY_DIR="$HOME/envio-core"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            cat > .env.raw <<'ENV_FILE'
            ${{ secrets.ENV_FILE }}
            ENV_FILE
            grep -vE '^\s*(#|$)' .env.raw > .env
            rm .env.raw
            chmod 600 .env

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/core-app:prod
            docker stop core-app || true
            docker rm core-app || true
            
            docker run -d \
              -p 8080:8080 \
              --name core-app \
              --restart always \
              --env-file "$DEPLOY_DIR/.env" \
              ${{ secrets.DOCKERHUB_USERNAME }}/core-app:prod
            
            docker image prune -f
