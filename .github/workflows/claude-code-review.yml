name: Claude Code Review

on:
  pull_request:
    branches: [ "develop" ]
    types: [ opened ]
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]
  pull_request_review:
    types: [ submitted ]

jobs:
  review:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            이 Pull Request를 리뷰해 주세요. 특히 아래 항목을 확인해 주세요.
            - 버그 가능성, 회귀 위험, 예외 처리 누락
            - Spring Boot/JPA 계층 구조와 트랜잭션 경계
            - SOLID, DRY, Clean Code 원칙 위반
            - 테스트 누락 또는 깨지기 쉬운 테스트
            - 보안상 위험한 입력 처리나 비밀값 노출

            이 저장소의 Gradle 프로젝트는 Core 디렉터리 아래에 있습니다.
            필요한 경우 `cd Core && ./gradlew test` 또는 `cd Core && ./gradlew checkstyleMain` 흐름을 참고해 주세요.
            리뷰 결과는 GitHub PR 코멘트로만 남기고, 중요도 높은 문제를 먼저 작성해 주세요.
          claude_args: |
            --max-turns 5
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  mention:
    if: |
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code mention response
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: |
            --max-turns 5
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
